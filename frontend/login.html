<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Admin — CuidarBem</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="toast-container"></div>

<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo" style="justify-content:center">
        <div class="logo-icon"><i class="fas fa-heart-pulse"></i></div>
        Cuidar<span style="color:var(--mint)">Bem</span>
      </div>
      <p>Área restrita — somente administradores</p>
    </div>

    <h2>Entrar no painel</h2>
    <p class="sub">Informe suas credenciais para continuar</p>

    <div class="login-hint">
      <i class="fas fa-circle-info" style="margin-right:6px;color:var(--mint)"></i>
      <strong>Demo:</strong> admin@cuidarbem.com.br / enfermagem2026
    </div>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="lemail">E-mail</label>
        <input type="email" id="lemail" placeholder="seu@email.com" value="admin@cuidarbem.com.br">
      </div>
      <div class="form-group">
        <label for="lsenha">Senha</label>
        <div style="position:relative">
          <input type="password" id="lsenha" placeholder="••••••••" value="enfermagem2026" style="padding-right:44px">
          <button type="button" id="togglePwd" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);font-size:.9rem">
            <i class="fas fa-eye"></i>
          </button>
        </div>
      </div>
      <div id="loginError" style="display:none;background:#fdf0f0;border:1px solid #fecaca;border-radius:10px;padding:10px 14px;font-size:.82rem;color:var(--danger);margin-bottom:14px">
        <i class="fas fa-circle-xmark" style="margin-right:6px"></i><span id="loginErrorMsg"></span>
      </div>
      <button type="submit" class="btn btn-primary form-submit" id="loginBtn">
        <i class="fas fa-right-to-bracket"></i>Entrar
      </button>
    </form>

    <div style="text-align:center;margin-top:20px">
      <a href="index.html" style="font-size:.82rem;color:var(--muted)">
        <i class="fas fa-arrow-left" style="margin-right:5px"></i>Voltar ao site
      </a>
    </div>
  </div>
</div>

<button class="btn-icon" id="themeToggle" style="position:fixed;top:20px;right:20px;background:var(--surface);box-shadow:var(--shadow);border:1px solid var(--line)">
  <i class="fas fa-moon"></i>
</button>

<script>
  // Redirect if already logged in
  if (localStorage.getItem('mm-admin-token')) {
    window.location.href = 'admin.html';
  }

  // Theme
  const html = document.documentElement;
  const saved = localStorage.getItem('mm-theme') || 'light';
  html.setAttribute('data-theme', saved);
  updateIcon(saved);
  document.getElementById('themeToggle').addEventListener('click', () => {
    const cur = html.getAttribute('data-theme');
    const next = cur === 'light' ? 'dark' : 'light';
    html.setAttribute('data-theme', next);
    localStorage.setItem('mm-theme', next);
    updateIcon(next);
  });
  function updateIcon(t) {
    document.getElementById('themeToggle').innerHTML = t === 'dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
  }

  // Password toggle
  document.getElementById('togglePwd').addEventListener('click', function() {
    const input = document.getElementById('lsenha');
    const isText = input.type === 'text';
    input.type = isText ? 'password' : 'text';
    this.innerHTML = isText ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
  });

  // Login
  document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const email = document.getElementById('lemail').value.trim();
    const senha = document.getElementById('lsenha').value;
    const errBox = document.getElementById('loginError');
    const errMsg = document.getElementById('loginErrorMsg');
    const btn = document.getElementById('loginBtn');

    errBox.style.display = 'none';
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>Entrando...';
    btn.disabled = true;

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, senha })
      });
      const json = await res.json();

      if (!res.ok) {
        errMsg.textContent = json.erro || 'Credenciais inválidas.';
        errBox.style.display = 'block';
        btn.innerHTML = '<i class="fas fa-right-to-bracket"></i>Entrar';
        btn.disabled = false;
        return;
      }

      localStorage.setItem('mm-admin-token', json.token);
      localStorage.setItem('mm-admin-user', JSON.stringify(json.usuario));
      window.location.href = 'admin.html';
    } catch {
      errMsg.textContent = 'Erro ao conectar com o servidor. Verifique se o backend está rodando.';
      errBox.style.display = 'block';
      btn.innerHTML = '<i class="fas fa-right-to-bracket"></i>Entrar';
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
